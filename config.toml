# AutoEnv configuration
# This file is FIXED — the agent should not modify it.

[eval]
# Single target model — the model we intend to train with RL
models = [
    "qwen/qwen3-235b-a22b-instruct-2507",
]

# Fixed eval budget — same for every iteration so results are comparable
num_examples = 10
rollouts_per_example = 2

[eval.vf]
# Path to verifiers endpoints registry
endpoints_path = "./verifiers/configs/endpoints.toml"
# Provider for prime eval
provider = "prime"
# Max concurrent requests
max_concurrent = 16

# Qualitative feedback is generated by a Claude Code judge instance
# launched from evaluate.sh — no API config needed here.
